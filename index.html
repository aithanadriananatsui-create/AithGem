<!DOCTYPE html>
<html>
<head>
<title>AithGem | @atihanadrainantsui</title>
<style>
  body { font-family: -apple-system, sans-serif; background-color: #fafafa; margin: 0; display: flex; justify-content: center; }
  .app-container { display: flex; max-width: 1100px; width: 100%; background: white; min-height: 100vh; border: 1px solid #dbdbdb; }
  
  /* Sidebar */
  .sidebar { width: 280px; border-right: 1px solid #dbdbdb; padding: 20px; background: #fff; }
  .search-box { margin-bottom: 20px; }
  .search-box input { width: 90%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
  
  /* Friends List */
  .friend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 5px; border-radius: 8px; transition: 0.2s; }
  .friend-row:hover { background: #f0f2f5; }
  .status-dot { width: 10px; height: 10px; background: #25d366; border-radius: 50%; }

  /* Main Content */
  .main-content { flex: 1; padding: 25px; }
  .profile-header { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
  .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; }
  
  .btn-call { background-color: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

  /* Screen Share / Meet Overlay */
  .meet-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
  .screen-display { width: 80%; height: 60%; border: 2px dashed #555; display: flex; align-items: center; justify-content: center; background: #222; margin-bottom: 20px; }

  /* Posts */
  .feed-item { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
</style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <h2>AithGem 💎</h2>
    <div class="search-box">
      <p><small><b>Add friend by Gmail:</b></small></p>
      <input type="text" id="emailSearch" placeholder="friend@gmail.com">
      <button onclick="findFriend()" style="margin-top:5px; width:100%; cursor:pointer;">Search</button>
    </div>
    <hr>
    <p><b>My Circle</b></p>
    <div id="friendsList">
      <div class="friend-row"><span>No friends added yet</span></div>
    </div>
  </div>

  <div class="main-content">
    <div class="profile-header">
      <img src="https://picsum.photos/id/1027/200/200" class="profile-pic">
      <div>
        <h1>atihanadrainantsui <span style="color:#0095f6">☑️</span></h1>
        <p><b>Coding Champion 🏆 | Legacy of El Anatsui</b></p>
        <button class="btn-call" onclick="startMeet()">📞 Join AithMeet</button>
      </div>
    </div>
